version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mfethuls-pg
    environment:
      POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - mfethuls_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MFETHULS_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MFETHULS_EXTRAS: service
    container_name: mfethuls-api
    working_dir: /app
    volumes:
      - ./:/app
      - ${DATA_ROOT}:/data
    environment:
      MFETHULS_MODE: service
      MFETHULS_API_KEY: ${MFETHULS_API_KEY}
      PATH_TO_DATA: /data
      PATH_TO_REGISTRY: ${PATH_TO_REGISTRY:-/data/experiments_template.csv}
      PATH_TO_LOCAL_STORAGE: /data/mfethuls_storage
      MFETHULS_DUCKDB_PATH: /data/mfethuls.duckdb
      MFETHULS_POSTGRES_ENABLED: ${MFETHULS_POSTGRES_ENABLED}
      MFETHULS_POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      MFETHULS_POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      MFETHULS_POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
      MFETHULS_POSTGRES_HOST: ${MFETHULS_POSTGRES_HOST_SERVICE}
      MFETHULS_POSTGRES_PORT: ${MFETHULS_POSTGRES_PORT}
    command: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MFETHULS_EXTRAS: "service,cloud"
    container_name: mfethuls-worker
    working_dir: /app
    volumes:
      - ./:/app
      - ${DATA_ROOT}:/data
    environment:
      MFETHULS_MODE: service
      PATH_TO_DATA: /data
      PATH_TO_REGISTRY: ${PATH_TO_REGISTRY:-/data/experiments_template.csv}
      PATH_TO_LOCAL_STORAGE: /data/mfethuls_storage
      MFETHULS_DUCKDB_PATH: /data/mfethuls.duckdb
      MFETHULS_POSTGRES_ENABLED: ${MFETHULS_POSTGRES_ENABLED}
      MFETHULS_POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      MFETHULS_POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      MFETHULS_POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
      MFETHULS_POSTGRES_HOST: ${MFETHULS_POSTGRES_HOST_SERVICE}
      MFETHULS_POSTGRES_PORT: ${MFETHULS_POSTGRES_PORT}
      PYTHONUTF8: "1"
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
      args:
        - METABASE_VERSION=0.58.9
        - METABASE_DUCKDB_DRIVER_VERSION=1.4.3.1
    container_name: metabase
    hostname: metabase
    user: "0"
    volumes:
      - ./:/home/metabase/data
      - ${DATA_ROOT}:/data
    environment:
      - MB_PLUGINS_DIR=/home/metabase/plugins/
      - MB_RESULT_ROW_MAXIMUM=1000000
    ports:
      - "3000:3000"
    restart: unless-stopped

  quack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MFETHULS_EXTRAS: service
    container_name: mfethuls-quack
    working_dir: /app
    volumes:
      - ./:/app
      - ${DATA_ROOT}:/data
    environment:
      MFETHULS_MODE: service
      MFETHULS_DUCKDB_PATH: /data/mfethuls.duckdb
      PATH_TO_DATA: /data
      PATH_TO_REGISTRY: ${PATH_TO_REGISTRY:-/data/experiments_template.csv}
      MFETHULS_POSTGRES_ENABLED: ${MFETHULS_POSTGRES_ENABLED}
      MFETHULS_POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      MFETHULS_POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      MFETHULS_POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
      MFETHULS_POSTGRES_HOST: ${MFETHULS_POSTGRES_HOST_SERVICE}
      MFETHULS_POSTGRES_PORT: ${MFETHULS_POSTGRES_PORT}
    entrypoint: ["python", "-m", "mfethuls.quack_server"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: mfethuls-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "8081:8081"
    depends_on:
      quack:
        condition: service_started
    restart: unless-stopped

volumes:
  mfethuls_pg_data:
