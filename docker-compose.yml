version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mfethuls-pg
    environment:
      POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - mfethuls_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MFETHULS_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MFETHULS_EXTRAS: service
    container_name: mfethuls-api
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      MFETHULS_DUCKDB_PATH: /app/.mfethuls_storage/mfethuls.duckdb
      MFETHULS_POSTGRES_ENABLED: ${MFETHULS_POSTGRES_ENABLED}
      MFETHULS_POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      MFETHULS_POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      MFETHULS_POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
      MFETHULS_POSTGRES_HOST: ${MFETHULS_POSTGRES_HOST_SERVICE}
      MFETHULS_POSTGRES_PORT: ${MFETHULS_POSTGRES_PORT}
    command: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MFETHULS_EXTRAS: "service,cloud"
    container_name: mfethuls-worker
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      MFETHULS_DUCKDB_PATH: /app/.mfethuls_storage/mfethuls.duckdb
      MFETHULS_POSTGRES_ENABLED: ${MFETHULS_POSTGRES_ENABLED}
      MFETHULS_POSTGRES_USER: ${MFETHULS_POSTGRES_USER}
      MFETHULS_POSTGRES_PASSWORD: ${MFETHULS_POSTGRES_PASSWORD}
      MFETHULS_POSTGRES_DB: ${MFETHULS_POSTGRES_DB}
      MFETHULS_POSTGRES_HOST: ${MFETHULS_POSTGRES_HOST_SERVICE}
      MFETHULS_POSTGRES_PORT: ${MFETHULS_POSTGRES_PORT}
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mfethuls_pg_data:
