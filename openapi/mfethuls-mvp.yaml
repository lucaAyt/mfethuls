openapi: 3.1.0
info:
  title: mfethuls Ingest and Query API
  version: "0.2.0"
  description: Registry preview, ingest jobs, datasets, and SQL queries (service mode).
servers:
  - url: http://localhost:8000
paths:
  /registry/preview:
    post:
      summary: Parse and validate a registry spreadsheet without ingesting
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PreviewUpload'
      responses:
        '200':
          description: Preview with validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
  /ingest:
    post:
      summary: Start ingestion job
      parameters:
        - in: query
          name: storage_mode
          schema:
            type: string
            enum: [local, cloud, both]
            default: local
        - in: query
          name: cloud_provider
          schema:
            type: string
            enum: [s3, azure]
        - in: query
          name: allow_invalid
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IngestUpload'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '422':
          description: Registry contains invalid rows (strict mode)
  /jobs/{job_id}:
    get:
      summary: Get job status
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
  /datasets:
    get:
      summary: List DuckDB-registered datasets
      responses:
        '200':
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetSummary'
  /queries:
    post:
      summary: Execute SQL against registered DuckDB views
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
  /health:
    get:
      summary: Liveness (service mode only)
      responses:
        '200':
          description: OK
components:
  schemas:
    PreviewUpload:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
    PreviewResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/PreviewRow'
        summary:
          $ref: '#/components/schemas/PreviewSummary'
    PreviewRow:
      type: object
      properties:
        row_number:
          type: integer
        values:
          type: object
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationMessage'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationMessage'
    PreviewSummary:
      type: object
      properties:
        total:
          type: integer
        valid:
          type: integer
        invalid:
          type: integer
    ValidationMessage:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    IngestUpload:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
    JobResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        progress:
          type: integer
        message:
          type: string
        registry_storage_path:
          type: string
        registry_table:
          type: string
        datasets:
          type: array
          items:
            type: object
            properties:
              experiment_id:
                type: string
              dataset_id:
                type: string
              storage_path:
                type: string
              status:
                type: string
    DatasetSummary:
      type: object
      properties:
        dataset_id:
          type: string
        name:
          type: string
        storage_mode:
          type: string
        queryable:
          type: boolean
        storage_path:
          type: string
        registered_at:
          type: string
    QueryRequest:
      type: object
      required: [sql]
      properties:
        sql:
          type: string
        dataset_ids:
          type: array
          items:
            type: string
        limit:
          type: integer
          default: 1000
        offset:
          type: integer
          default: 0
    QueryResponse:
      type: object
      properties:
        query_id:
          type: string
        status:
          type: string
        columns:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
        rows:
          type: array
          items:
            type: array
        pagination:
          type: object
        execution_ms:
          type: integer
